services:
  # ---- MongoDB ----
  mongodb:
    image: mongo:7
    container_name: mail-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    command: >
      mongod
      --wiredTigerCacheSizeGB 0.25
      --quiet
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mail-net

  # ---- Mail Service (SMTP + REST API) ----
  mail-service:
    image: ${MAIL_SERVICE_IMAGE:-manymail-mail-service:local}
    build: ./mail-service
    container_name: mail-service
    restart: unless-stopped
    ports:
      - "25:25"
      - "127.0.0.1:8080:8080"
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - ENABLE_API_DOCS=0
      - EXPOSE_HEALTH_DETAILS=0
      - RATE_LIMIT_WINDOW=60
      - RATE_LIMIT_MAX=60
      - REQUIRE_API_KEY_FOR_ACCOUNTS=${REQUIRE_API_KEY_FOR_ACCOUNTS:-1}
      - SMTP_RCPT_RATE_WINDOW=60
      - SMTP_RCPT_RATE_MAX=100
      - SMTP_DATA_RATE_WINDOW=60
      - SMTP_DATA_RATE_MAX=20
      - SMTP_MAX_RCPTS_PER_MESSAGE=20
      - SMTP_MAX_MESSAGE_BYTES=1048576
      - SMTP_MAX_ADDRESS_LENGTH=320
      - SMTP_BLACKLIST_IPS=
      - SMTP_BLACKLIST_SENDERS=
      - SMTP_GREYLIST_ENABLED=0
      - SMTP_GREYLIST_DELAY_SECONDS=60
      - SMTP_GREYLIST_TTL_SECONDS=3600
      - SMTP_TLS_CERT=${SMTP_TLS_CERT:-}
      - SMTP_TLS_KEY=${SMTP_TLS_KEY:-}
    # Uncomment to mount TLS certificates for STARTTLS:
    # volumes:
    #   - /etc/letsencrypt/live/mail.yourdomain.com/fullchain.pem:/certs/fullchain.pem:ro
    #   - /etc/letsencrypt/live/mail.yourdomain.com/privkey.pem:/certs/privkey.pem:ro
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - mail-net

  # ---- Mail Viewer (Web UI) ----
  mail-viewer:
    image: ${MAIL_VIEWER_IMAGE:-manymail-mail-viewer:local}
    build: ./mail-viewer
    container_name: mail-viewer
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DUCKMAIL_BASE_URL=http://mail-service:8080
      - VIEWER_SETTINGS_FILE=/data/settings.json
      - MAX_IMAGE_PROXY_BYTES=${MAX_IMAGE_PROXY_BYTES:-5242880}
      - IMAGE_PROXY_CONNECT_TIMEOUT_SECONDS=${IMAGE_PROXY_CONNECT_TIMEOUT_SECONDS:-3}
      - IMAGE_PROXY_READ_TIMEOUT_SECONDS=${IMAGE_PROXY_READ_TIMEOUT_SECONDS:-8}
      - AI_TRANSLATION_TIMEOUT_SECONDS=${AI_TRANSLATION_TIMEOUT_SECONDS:-45}
      - IMAP_MAIL_BASE_URL=http://imap-mail:3939
    volumes:
      - viewer_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/login', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      mail-service:
        condition: service_healthy
      imap-mail:
        condition: service_healthy
    networks:
      - mail-net

  # ---- IMAP Mail Bridge (Node.js) ----
  imap-mail:
    image: ${IMAP_MAIL_IMAGE:-manymail-imap-mail:local}
    build: ./mail-viewer/imap-mail-app
    container_name: mail-imap-bridge
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3939
      - ACCOUNTS_FILE=/data/accounts.json
      - SETTINGS_FILE=/data/settings.json
      - MONGO_URL=mongodb://mongodb:27017
      - MONGO_DB_NAME=mailserver
      - IMAP_CACHE_TTL_SECONDS=${IMAP_CACHE_TTL_SECONDS:-86400}
      - IMAP_CACHE_SYNC_WINDOW=${IMAP_CACHE_SYNC_WINDOW:-100}
      - IMAP_CACHE_LOOKBACK=${IMAP_CACHE_LOOKBACK:-50}
      - IMAP_SYNC_CHECK_INTERVAL_SECONDS=${IMAP_SYNC_CHECK_INTERVAL_SECONDS:-900}
      - IMAP_SYNC_STARTUP_DELAY_SECONDS=${IMAP_SYNC_STARTUP_DELAY_SECONDS:-20}
    volumes:
      - imap_mail_data:/data
    expose:
      - "3939"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3939/api/accounts').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - mail-net
    depends_on:
      mongodb:
        condition: service_healthy

  # ---- IMAP Server (Node.js) ----
  imap-server:
    image: ${IMAP_SERVER_IMAGE:-manymail-imap-server:local}
    build: ./imap-server
    container_name: mail-imap-server
    restart: unless-stopped
    ports:
      - "993:993"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=mailserver
      - IMAP_PORT=993
      - TLS_CERT=/certs/fullchain.pem
      - TLS_KEY=/certs/privkey.pem
    volumes:
      - ${IMAP_CERTS_PATH:-./certs}:/certs:ro
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const n=require('net');const c=n.connect(993,'127.0.0.1',()=>{c.destroy();process.exit(0)});c.on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - mail-net

volumes:
  mongo_data:
  viewer_data:
  imap_mail_data:

networks:
  mail-net:
    driver: bridge
