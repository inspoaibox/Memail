name: Desktop

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore .\Memail.Desktop\Memail.Desktop.csproj

      - name: Build
        run: dotnet build .\Memail.Desktop\Memail.Desktop.csproj -c Release --no-restore

      - name: Publish win-x64
        run: dotnet publish .\Memail.Desktop\Memail.Desktop.csproj -c Release -r win-x64 --self-contained false -o .\artifacts\Memail.Desktop-win-x64

      - name: Publish win-x64 self-contained
        run: dotnet publish .\Memail.Desktop\Memail.Desktop.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o .\artifacts\Memail.Desktop-win-x64-self-contained

      - name: Upload framework-dependent artifact
        uses: actions/upload-artifact@v4
        with:
          name: Memail.Desktop-win-x64
          path: .\artifacts\Memail.Desktop-win-x64

      - name: Upload self-contained artifact
        uses: actions/upload-artifact@v4
        with:
          name: Memail.Desktop-win-x64-self-contained
          path: .\artifacts\Memail.Desktop-win-x64-self-contained
