<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memail - Login</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #5b9a8b;
            --primary-hover: #4a8a7b;
        }
        body {
            background: linear-gradient(135deg, #ffffff 0%, #f7fbf9 50%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(91,154,139,0.15);
        }
        .security-note {
            font-size: 0.82rem;
            color: #6b7c84;
            text-align: center;
            margin-top: 14px;
        }
        .login-title {
            font-family: 'Satisfy', cursive;
            color: #2a5f8a;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo {
            width: 42px;
            height: 42px;
            object-fit: contain;
            margin-right: 10px;
            vertical-align: -9px;
        }
        .btn-primary {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
        }
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(91,154,139,0.15);
        }
        .lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
        }
    </style>
</head>
<body>
    <button class="btn btn-sm btn-outline-secondary lang-toggle" onclick="toggleLang()" id="btn-lang">
        <i class="bi bi-translate me-1"></i><span id="lang-label">EN</span>
    </button>

    <div class="login-card">
        <h1 class="login-title">
            <img class="login-logo" src="{{ url_for('static', filename='logo.png') }}" alt="Memail">Memail
        </h1>

        {% if error %}
        <div class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
        </div>
        {% endif %}

        <form method="POST" autocomplete="off">
            <div class="mb-3">
                <label class="form-label" data-i18n="username">管理员账号</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" name="username" value="{{ username or '' }}" data-i18n-ph="enterUsername" placeholder="请输入管理员账号" autocomplete="username" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label" data-i18n="password">访问密码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="password" class="form-control" name="password" data-i18n-ph="enterPassword" placeholder="请输入密码" autocomplete="current-password" required>
                </div>
            </div>
            {% if totp_required %}
            <div class="mb-4">
                <label class="form-label" data-i18n="totpCode">二次验证码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                    <input type="text" class="form-control" name="totp_code" inputmode="numeric" pattern="[0-9]{6}" data-i18n-ph="enterTotp" placeholder="6 位验证码" autocomplete="one-time-code" required>
                </div>
            </div>
            {% endif %}
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i><span data-i18n="login">登录</span>
            </button>
            <div class="security-note" data-i18n="securityNote">多次失败会临时锁定登录入口</div>
        </form>
    </div>

    <script>
        const LANGS = {
            zh: {
                username: '管理员账号',
                enterUsername: '请输入管理员账号',
                password: '访问密码',
                enterPassword: '请输入密码',
                totpCode: '二次验证码',
                enterTotp: '6 位验证码',
                login: '登录',
                securityNote: '多次失败会临时锁定登录入口',
            },
            en: {
                username: 'Admin Username',
                enterUsername: 'Enter admin username',
                password: 'Password',
                enterPassword: 'Enter password',
                totpCode: '2FA Code',
                enterTotp: '6-digit code',
                login: 'Login',
                securityNote: 'Too many failures will temporarily lock login',
            }
        };
        let currentLang = localStorage.getItem('manymail-lang') || 'zh';

        function t(key) { return (LANGS[currentLang] || LANGS.zh)[key] || key; }

        function applyLang() {
            document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
            document.querySelectorAll('[data-i18n-ph]').forEach(el => { el.placeholder = t(el.dataset.i18nPh); });
            document.getElementById('lang-label').textContent = currentLang === 'zh' ? 'EN' : '中';
            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
        }

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('manymail-lang', currentLang);
            applyLang();
        }

        applyLang();
    </script>
</body>
</html>
